<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>You Are Invited</title>

<!-- ============================================================
     FONTS
     Cormorant Garamond  -> elegant display serif (invitation copy)
     Montserrat           -> clean utility sans (UI chrome, captions)
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     DESIGN TOKENS
     Palette (as specified): mint, deep red, gold-brown, white, blue
     Kept mostly to tints of white + mint, with red/gold as accents
     and blue reserved for the smallest details so nothing fights
     for attention.
     ============================================================ */
  :root{
    --mint:        #A9CDB8;   /* light mint green - primary accent   */
    --mint-tint:   #EAF4EE;   /* pale mint - background wash         */
    --deep-red:    #7C2A34;   /* deep red - highlights                */
    --gold:        #A9793F;  /* gold brown - decorative / premium    */
    --gold-soft:   #C9A66B;
    --white:       #FFFFFF;
    --blue:        #4F6D8C;   /* complementary accent, used sparingly*/
    --ink:         #2B2A28;   /* near-black text, warmer than pure black */

    --shadow-soft: 0 20px 60px -20px rgba(43, 42, 40, 0.35);
    --shadow-tight:0 6px 18px -6px rgba(43, 42, 40, 0.25);

    --ease: cubic-bezier(.22,.61,.36,1);
    --dur-slide: 420ms;
  }

  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--white);
    font-family:'Montserrat', sans-serif;
    color: var(--ink);
    overflow:hidden; /* the invitation is a single, fixed "room" */
  }

  /* Subtle ambient backdrop: a soft mint wash with a whisper of gold,
     so the frame never floats on flat white. */
  body{
    background:
      radial-gradient(120% 90% at 50% -10%, var(--mint-tint) 0%, rgba(255,255,255,0) 55%),
      radial-gradient(140% 100% at 50% 115%, rgba(169,121,63,0.10) 0%, rgba(255,255,255,0) 55%),
      var(--white);
  }

  /* ============================================================
     STAGE — full-viewport container that holds the ornamental
     frame + carousel + chrome
     ============================================================ */
  .stage{
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: clamp(14px, 4vw, 42px);
  }

  /* Ornamental frame: double-line border, gold outer / mint inner —
     this is the signature element that turns plain photos into
     "pages" of a formal invitation. */
  .frame{
    position:relative;
    aspect-ratio: 2 / 3;                                  /* matches the invitation images' true 7200x10800 ratio */
    width:auto;
    height: min(86vh, 780px, calc(92vw * 1.5));            /* whichever of height/width is tighter wins, so it always fits */
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow-soft);
    padding: 10px;
    border: 1px solid rgba(169,121,63,0.35);
  }
  .frame::before{
    /* inner mint hairline, inset from the gold outer border */
    content:"";
    position:absolute;
    inset: 6px;
    border: 1px solid rgba(169,205,184,0.9);
    border-radius: 10px;
    pointer-events:none;
    z-index: 3;
  }
  /* Corner flourishes — small gold ticks, quiet but distinctive */
  .frame .corner{
    position:absolute;
    width:22px; height:22px;
    pointer-events:none;
    z-index:4;
  }
  .frame .corner svg{ width:100%; height:100%; display:block; }
  .corner.tl{ top:-1px; left:-1px; }
  .corner.tr{ top:-1px; right:-1px; transform: scaleX(-1); }
  .corner.bl{ bottom:-1px; left:-1px; transform: scaleY(-1); }
  .corner.br{ bottom:-1px; right:-1px; transform: scale(-1,-1); }

  /* ============================================================
     CAROUSEL
     Split into two zones so controls never sit on top of the
     photo: the image fills .carousel-main untouched, and a thin
     gold hairline hands off to a separate white .carousel-footer
     that holds the page count, dots, and sound toggle.
     ============================================================ */
  .carousel{
    position:relative;
    width:100%; height:100%;
    border-radius: 8px;
    overflow:hidden;
    background: var(--mint-tint);
    touch-action: pan-y; /* allow vertical scroll of page, we own horizontal swipe */
    display:flex;
    flex-direction:column;
  }

  .carousel-main{
    position:relative;
    flex: 1 1 auto;
    min-height:0;
    overflow:hidden;
    contain: layout paint;
  }

  /* The hand-off divider between image and control bar */
  .carousel-footer{
    position:relative;
    flex: 0 0 auto;
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--white);
    border-top: 1px solid rgba(169,121,63,0.32);
  }
  /* thin mint accent hugging the gold divider, echoes the frame's
     double-line motif so the separation still feels designed */
  .carousel-footer::before{
    content:"";
    position:absolute;
    top:-3px; left:0; right:0;
    height:1px;
    background: rgba(169,205,184,0.9);
  }

  .slide{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    /* opacity-only crossfade: a scale transform here forces the browser to
       repaint/composite a full-resolution bitmap every frame, which is what
       was causing the mobile lag. Plain opacity is compositor-only (GPU),
       so it stays smooth even with very large source images. */
    transition: opacity var(--dur-slide) var(--ease);
    pointer-events:none;
    will-change: opacity;
    contain: layout paint;     /* isolate each slide's paint work from the rest of the page */
    backface-visibility: hidden;
  }
  .slide.active{
    opacity:1;
    pointer-events:auto;
    z-index:2;
  }
  .slide img{
    width:100%;
    height:100%;
    object-fit: contain;    /* show the FULL image, no cropping, regardless of frame shape */
    object-position: center;
    display:block;
    -webkit-user-drag:none;
    user-select:none;
  }

  /* Placeholder shown only if an image genuinely fails to load,
     so the invitation still looks intentional rather than broken. */
  .slide .missing{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%; height:100%;
    background: linear-gradient(160deg, var(--mint-tint), #fff);
    color: var(--gold);
    font-family:'Cormorant Garamond', serif;
    font-size: 1.1rem;
    letter-spacing:.04em;
  }

  /* ============================================================
     FOOTER CHROME — page counter + dots + music toggle
     Lives in .carousel-footer now, entirely off the photo, so it
     reads on white/mint rather than needing to fight the image
     for contrast.
     ============================================================ */
  .page-count{
    justify-self:start;
    color: var(--ink);
    background: var(--mint-tint);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: .68rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    border: 1px solid rgba(169,205,184,0.9);
    white-space:nowrap;
  }
  .page-count strong{ color: var(--deep-red); font-weight:600; }

  .sound-toggle{
    justify-self:end;
    width:34px; height:34px;
    border-radius:50%;
    border: 1px solid rgba(169,121,63,0.4);
    background: var(--white);
    color: var(--gold);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: transform .25s var(--ease), background .25s var(--ease), color .25s var(--ease);
  }
  .sound-toggle:hover{ background: var(--deep-red); color: var(--white); border-color: var(--deep-red); }
  .sound-toggle:active{ transform: scale(.92); }
  .sound-toggle svg{ width:16px; height:16px; }

  /* ============================================================
     NAV ARROWS
     ============================================================ */
  .nav-btn{
    position:absolute;
    top:50%;
    transform: translateY(-50%);
    width: 40px; height:40px;
    border-radius:50%;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.10); /* mostly see-through: the photo shows through the button */
    color: var(--white);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index:5;
    /* legibility comes from the shadow, not from darkening the image behind it */
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.55));
    transition: background .25s var(--ease), transform .25s var(--ease), border-color .25s var(--ease);
  }
  .nav-btn:hover{ background: rgba(124,42,52,0.75); border-color: var(--deep-red); }
  .nav-btn:active{ transform: translateY(-50%) scale(.93); }
  .nav-btn svg{ width:16px; height:16px; }
  .nav-btn.prev{ left:10px; }
  .nav-btn.next{ right:10px; }
  .nav-btn:focus-visible{
    outline: 2px solid var(--blue);
    outline-offset: 3px;
  }

  /* ============================================================
     DOT INDICATORS — now inside .carousel-footer, on plain white,
     never over the photo
     ============================================================ */
  .dots{
    justify-self:center;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
  }
  .dot{
    width:7px; height:7px;
    border-radius:50%;
    background: rgba(169,121,63,0.28);
    border: 1px solid rgba(169,121,63,0.4);
    cursor:pointer;
    padding:0;
    transition: background .25s var(--ease), width .25s var(--ease), border-color .25s var(--ease);
  }
  .dot.active{
    width:20px;
    border-radius:5px;
    background: var(--deep-red);
    border-color: var(--deep-red);
  }
  .dot:focus-visible{ outline: 2px solid var(--blue); outline-offset:2px; }

  /* ============================================================
     FIRST-INTERACTION OVERLAY (autoplay unlock)
     Minimal, on-brand, disappears after first tap/click/key
     ============================================================ */
  .start-veil{
    position:absolute; inset:0;
    z-index:9;
    background: rgba(20,20,18,0.55);
    backdrop-filter: blur(3px);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color: var(--white);
    cursor:pointer;
    transition: opacity .5s var(--ease);
  }
  .start-veil.hidden{ opacity:0; pointer-events:none; }
  .start-veil .veil-inner{
    padding: 22px 28px;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 12px;
    background: rgba(43,42,40,0.35);
  }
  .start-veil .veil-title{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    letter-spacing:.02em;
    margin: 0 0 6px;
  }
  .start-veil .veil-sub{
    font-size:.72rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color: var(--gold-soft);
    margin:0;
  }

  /* ============================================================
     RESPONSIVE — phones / tablets / laptops / desktops
     ============================================================ */

  /* Small phones */
  @media (max-width: 480px){
    .stage{ padding: 10px; }
    .frame{
      aspect-ratio: 2 / 3;
      height: min(100dvh, calc(100vw * 1.5));
      width:auto;
      border-radius: 0; box-shadow:none; padding:6px;
    }
    .frame::before{ border-radius:4px; }
    .carousel{ border-radius: 4px; }
    .nav-btn{ width:36px; height:36px; }
    .carousel-footer{ padding: 8px 10px; }
    .page-count{ font-size:.62rem; padding:5px 9px; }
    .sound-toggle{ width:30px; height:30px; }
  }

  /* Tablets */
  @media (min-width: 481px) and (max-width: 900px){
    .frame{ height: min(84vh, 720px, calc(90vw * 1.5)); }
  }

  /* Laptops / desktops: give the frame a touch more presence
     and move the arrows outside the frame edge for a refined look */
  @media (min-width: 901px){
    .frame{ height: min(88vh, 820px, calc(40vw * 1.5)); }
    .nav-btn.prev{ left: -60px; background: rgba(43,42,40,0.06); color: var(--gold); border-color: rgba(169,121,63,0.4); }
    .nav-btn.next{ right: -60px; background: rgba(43,42,40,0.06); color: var(--gold); border-color: rgba(169,121,63,0.4); }
    .nav-btn.prev:hover, .nav-btn.next:hover{ background: var(--deep-red); color:var(--white); border-color: var(--deep-red); }
  }

  @media (min-width: 901px) and (max-width: 1180px){
    .nav-btn.prev{ left:-48px; } .nav-btn.next{ right:-48px; }
  }

  /* Short / landscape phones */
  @media (max-height: 480px) and (orientation: landscape){
    .frame{ height: min(94dvh, calc(60vw * 1.5)); }
  }

  /* Respect reduced-motion preferences */
  @media (prefers-reduced-motion: reduce){
    .slide{ transition: opacity .01ms linear !important; transform:none !important; }
    .nav-btn, .dot, .sound-toggle{ transition:none !important; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="frame" role="region" aria-label="Wedding invitation, page viewer">

    <!-- Gold corner flourishes -->
    <span class="corner tl"><svg viewBox="0 0 22 22"><path d="M1 21V4C1 2.3 2.3 1 4 1H21" fill="none" stroke="#A9793F" stroke-width="1.4"/></svg></span>
    <span class="corner tr"><svg viewBox="0 0 22 22"><path d="M1 21V4C1 2.3 2.3 1 4 1H21" fill="none" stroke="#A9793F" stroke-width="1.4"/></svg></span>
    <span class="corner bl"><svg viewBox="0 0 22 22"><path d="M1 21V4C1 2.3 2.3 1 4 1H21" fill="none" stroke="#A9793F" stroke-width="1.4"/></svg></span>
    <span class="corner br"><svg viewBox="0 0 22 22"><path d="M1 21V4C1 2.3 2.3 1 4 1H21" fill="none" stroke="#A9793F" stroke-width="1.4"/></svg></span>

    <div class="carousel" id="carousel" aria-roledescription="carousel">

      <!-- IMAGE ZONE: only the photo + nav arrows + start veil live here,
           so nothing but the (near-transparent) arrows ever sits on the image -->
      <div class="carousel-main">

        <!-- Slides are injected here by JS -->
        <div id="slidesContainer"></div>

        <!-- Prev / Next -->
        <button class="nav-btn prev" id="prevBtn" aria-label="Previous page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="nav-btn next" id="nextBtn" aria-label="Next page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <!-- First-interaction veil (needed to satisfy browser autoplay policies) -->
        <div class="start-veil" id="startVeil">
          <div class="veil-inner">
            <p class="veil-title">Tap to begin</p>
            <p class="veil-sub">Music will play softly</p>
          </div>
        </div>

      </div>

      <!-- CONTROL BAR: separated from the photo by a gold hairline divider -->
      <div class="carousel-footer">
        <div class="page-count" id="pageCount" aria-live="polite">Page <strong id="curPage">1</strong> / <span id="totalPages">6</span></div>

        <!-- Dot indicators -->
        <div class="dots" id="dots"></div>

        <button class="sound-toggle" id="soundToggle" aria-label="Mute background music" aria-pressed="false">
          <svg id="soundIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9v6h4l5 5V4L8 9H4z"/>
            <path d="M16 8a5 5 0 0 1 0 8"/>
            <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
          </svg>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Background music: loops continuously, unlocked on first user interaction -->
<audio id="bgMusic" src="ISH.mp3" loop preload="auto"></audio>

<script>
/* ==================================================================
   CONFIG
   ================================================================== */
const TOTAL_SLIDES = 6;                                  // images 1..6
const EXT_CANDIDATES = ['jpg', 'jpeg', 'png', 'webp'];    // tried in order

/* ==================================================================
   BUILD SLIDES
   Performance note: these source images are very large (7200x10800).
   Decoding six of them at once was the main cause of mobile lag, so
   instead of loading every image up front, we only detect each
   image's real extension here, then lazily MOUNT the actual <img>
   for whichever slides are current / previous / next. Anything
   further away gets its <img> removed again to free memory.
   ================================================================== */
const slidesContainer = document.getElementById('slidesContainer');
const dotsContainer   = document.getElementById('dots');
let currentIndex = 0;
const slideEls = [];
const dotEls = [];
const resolvedSrc = [];   // resolved image URL per slide, filled in async
const missingSlide = [];  // true if no matching file was found at all

function resolveImageSrc(num, extIndex, onSuccess, onFail){
  if (extIndex >= EXT_CANDIDATES.length){ onFail(); return; }
  const testUrl = `${num}.${EXT_CANDIDATES[extIndex]}`;

  // HEAD request: confirms the file exists without decoding it (fast,
  // no memory cost). Falls back to the old Image() probe only if HEAD
  // isn't available, e.g. when opened directly as a file:// page.
  fetch(testUrl, { method: 'HEAD' })
    .then((res) => {
      if (res.ok) onSuccess(testUrl);
      else resolveImageSrc(num, extIndex + 1, onSuccess, onFail);
    })
    .catch(() => {
      const tester = new Image();
      tester.onload  = () => onSuccess(testUrl);
      tester.onerror = () => resolveImageSrc(num, extIndex + 1, onSuccess, onFail);
      tester.src = testUrl;
    });
}

function buildSlide(num){
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.setAttribute('role', 'group');
  slide.setAttribute('aria-roledescription', 'slide');
  slide.setAttribute('aria-label', `Page ${num} of ${TOTAL_SLIDES}`);
  slidesContainer.appendChild(slide);
  slideEls[num - 1] = slide;

  resolveImageSrc(num, 0,
    (src) => {
      resolvedSrc[num - 1] = src;
      missingSlide[num - 1] = false;
      // Mount immediately only if this slide is inside the initial
      // active window; otherwise it stays unmounted until needed.
      if (isWithinMountWindow(num - 1)) mountSlideImage(num - 1);
    },
    () => {
      missingSlide[num - 1] = true;
      renderMissingPlaceholder(num - 1);
    }
  );

  // Dot indicator
  const dot = document.createElement('button');
  dot.className = 'dot';
  dot.setAttribute('aria-label', `Go to page ${num}`);
  dot.addEventListener('click', () => goToSlide(num - 1));
  dotsContainer.appendChild(dot);
  dotEls[num - 1] = dot;
}

function renderMissingPlaceholder(index){
  const slide = slideEls[index];
  if (!slide || slide.querySelector('.missing')) return;
  const missing = document.createElement('div');
  missing.className = 'missing';
  missing.innerHTML = `<div>Page ${index + 1}</div>`;
  slide.appendChild(missing);
}

// Only keep the current slide plus one on each side actually mounted.
const MOUNT_RADIUS = 1;

function isWithinMountWindow(index, center = currentIndex){
  for (let d = -MOUNT_RADIUS; d <= MOUNT_RADIUS; d++){
    if (((center + d) + TOTAL_SLIDES) % TOTAL_SLIDES === index) return true;
  }
  return false;
}

function mountSlideImage(index){
  const slide = slideEls[index];
  if (!slide || missingSlide[index]) return;
  if (slide.querySelector('img')) return; // already mounted
  const src = resolvedSrc[index];
  if (!src) return; // extension not resolved yet — mountWindow() will retry once it lands

  const img = document.createElement('img');
  img.src = src;
  img.alt = `Invitation page ${index + 1}`;
  img.draggable = false;
  img.decoding = 'async';
  // The active slide loads eagerly and with priority; neighbors are
  // still mounted (so swiping feels instant) but decode lazily.
  img.loading = index === currentIndex ? 'eager' : 'lazy';
  if ('fetchPriority' in img) img.fetchPriority = index === currentIndex ? 'high' : 'low';
  slide.appendChild(img);
}

function unmountSlideImage(index){
  const slide = slideEls[index];
  const img = slide && slide.querySelector('img');
  if (img) img.remove();
}

function updateMountWindow(){
  for (let i = 0; i < TOTAL_SLIDES; i++){
    if (isWithinMountWindow(i)) mountSlideImage(i);
    else unmountSlideImage(i);
  }
}

for (let i = 1; i <= TOTAL_SLIDES; i++) buildSlide(i);
updateMountWindow(); // mount the initial current/prev/next trio

/* ==================================================================
   SLIDE NAVIGATION
   ================================================================== */
const curPageLabel = document.getElementById('curPage');
const totalPagesLabel = document.getElementById('totalPages');
totalPagesLabel.textContent = TOTAL_SLIDES;

function goToSlide(index){
  index = (index + TOTAL_SLIDES) % TOTAL_SLIDES; // wrap around both ends
  slideEls[currentIndex]?.classList.remove('active');
  dotEls[currentIndex]?.classList.remove('active');

  currentIndex = index;

  slideEls[currentIndex]?.classList.add('active');
  dotEls[currentIndex]?.classList.add('active');
  curPageLabel.textContent = currentIndex + 1;

  updateMountWindow(); // keep only current/prev/next decoded, drop the rest
}

document.getElementById('prevBtn').addEventListener('click', () => goToSlide(currentIndex - 1));
document.getElementById('nextBtn').addEventListener('click', () => goToSlide(currentIndex + 1));

// Keyboard navigation (left / right arrows)
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
  if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
});

// Show first slide once slides exist
goToSlide(0);

/* ==================================================================
   SWIPE GESTURES (touch devices)
   ================================================================== */
const carousel = document.getElementById('carousel');
let touchStartX = 0;
let touchStartY = 0;
const SWIPE_THRESHOLD = 45; // px

carousel.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

carousel.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;

  // Only treat as a slide-swipe if the gesture is mostly horizontal,
  // so vertical scrolling on a tall page still works naturally.
  if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)){
    if (dx < 0) goToSlide(currentIndex + 1); // swipe left -> next
    else goToSlide(currentIndex - 1);        // swipe right -> prev
  }
}, { passive: true });

/* ==================================================================
   BACKGROUND MUSIC
   Autoplay is blocked by most browsers until the user interacts
   with the page. We attempt playback immediately; if blocked, we
   retry on the very first click / tap / keypress / swipe, then
   never touch playback again so it keeps looping uninterrupted
   across slide changes.
   ================================================================== */
const bgMusic = document.getElementById('bgMusic');
const soundToggle = document.getElementById('soundToggle');
const soundIcon = document.getElementById('soundIcon');
const startVeil = document.getElementById('startVeil');
let musicUnlocked = false;

function tryPlayMusic(){
  if (musicUnlocked) return;
  const playPromise = bgMusic.play();
  if (playPromise !== undefined){
    playPromise
      .then(() => { musicUnlocked = true; hideVeil(); })
      .catch(() => { /* still blocked — wait for a user gesture */ });
  }
}

function hideVeil(){
  startVeil.classList.add('hidden');
}

// Attempt immediately on load (works in browsers with permissive policies)
window.addEventListener('load', tryPlayMusic);

// Unlock on the very first user interaction of any kind
['click', 'touchend', 'keydown'].forEach((evt) => {
  document.addEventListener(evt, function unlockOnce(){
    tryPlayMusic();
    hideVeil();
  }, { once: true });
});

startVeil.addEventListener('click', () => { tryPlayMusic(); hideVeil(); });

// Manual mute / unmute toggle (does not restart the track)
soundToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  bgMusic.muted = !bgMusic.muted;
  soundToggle.setAttribute('aria-pressed', bgMusic.muted ? 'true' : 'false');
  soundToggle.setAttribute('aria-label', bgMusic.muted ? 'Unmute background music' : 'Mute background music');
  soundIcon.style.opacity = bgMusic.muted ? '0.45' : '1';
});
</script>
</body>
</html>
